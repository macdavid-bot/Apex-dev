# Nginx reverse proxy for Apex Dev
# Copy to: /etc/nginx/sites-available/apex-dev
# Then: ln -s /etc/nginx/sites-available/apex-dev /etc/nginx/sites-enabled/
# And:  nginx -t && systemctl reload nginx

upstream apex_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream apex_web {
    server 127.0.0.1:5000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;  # <-- replace with your domain or IP
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;  # <-- replace with your domain or IP

    # TLS — use certbot/Let's Encrypt or your own cert
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    # Client body limit (for file uploads / large AI contexts)
    client_max_body_size 25m;

    # ── API — proxied to Node.js backend ────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://apex_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE — disable buffering so events stream in real-time
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── WebSocket — local terminal ───────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://apex_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Direct API routes (no /api/ prefix in production single-origin) ──────────
    location ~ ^/(auth|shell|approvals|validation|workspace|repository|context|orchestrator|workflow|git|deployment|terminal|repair|memory|system|github|vps|files|jobs|repos|rollback|domains|db-admin|health-monitor|health)(/|$) {
        proxy_pass         http://apex_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
    }

    # ── Frontend — serve built React app ────────────────────────────────────────
    location / {
        root   /var/www/apex-dev/apps/web/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Gzip compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
