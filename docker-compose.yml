version: '3.9'

services:
  apex-dev:
    build: .
    container_name: apex-dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./:/app
      - apex_node_modules:/app/node_modules

  postgres:
    image: postgres:16
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apexdev
    ports:
      - '5432:5432'
    volumes:
      - apex_postgres_data:/var/lib/postgresql/data

volumes:
  apex_node_modules:
  apex_postgres_data:
